<!DOCTYPE html>\n<html lang=\"zh-TW\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>\u6211\u7684\u5c0f\u5e33\u672c</title>\n<link href=\"https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+TC:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap\" rel=\"stylesheet\">\n<style>\n/* \u2500\u2500 Themes \u2500\u2500 */\n:root {\n  --a1:#F2A93B; --a2:#D4641E; --pale:#FFF3D6; --pale2:#FFE8B4;\n  --bg:#FFFAF0; --surf:#FFFFFF;\n  --bdr:rgba(242,169,59,0.18); --bdrm:rgba(242,169,59,0.32);\n  --grad:linear-gradient(135deg,#F2A93B,#D4641E);\n  --tx:#3A2C18; --txm:#7A6848; --txl:#B8A070;\n  --shsm:0 2px 8px rgba(180,120,40,0.08);\n  --r:18px; --rsm:12px; --rxs:8px;\n}\n[data-theme=\"B\"]{\n  --a1:#F28B70; --a2:#C44F35; --pale:#FFF0EB; --pale2:#FFDDD0;\n  --bg:#FFF8F5; --surf:#FFFFFF;\n  --bdr:rgba(242,139,112,0.18); --bdrm:rgba(242,139,112,0.32);\n  --grad:linear-gradient(135deg,#F28B70,#C44F35);\n  --tx:#3A1E18; --txm:#7A4840; --txl:#C09080;\n  --shsm:0 2px 8px rgba(180,80,60,0.08);\n}\n*{margin:0;padding:0;box-sizing:border-box;}\nbody{font-family:'DM Sans','Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:88px;transition:background .3s,color .3s;}\n\n/* Header */\n.hdr{background:var(--grad);padding:24px 20px 30px;position:relative;overflow:hidden;}\n.hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;background:rgba(255,255,255,0.13);border-radius:50%;}\n.hdr::after{content:'';position:absolute;bottom:-20px;left:30px;width:80px;height:80px;background:rgba(255,255,255,0.08);border-radius:50%;}\n.hdr-title{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;}\n.hdr-date{font-size:12px;color:rgba(255,255,255,0.65);margin-top:6px;letter-spacing:.04em;}\n\n/* Bottom nav */\n.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bdrm);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);box-shadow:0 -4px 20px rgba(0,0,0,0.06);z-index:100;}\n.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700;color:var(--txl);transition:color .2s;letter-spacing:.03em;}\n.bb .ic{font-size:20px;}\n.bb.active{color:var(--a1);}\n\n/* Pages */\n.pg{display:none;padding:16px;}\n.pg.active{display:block;}\n\n/* Cards */\n.card{background:var(--surf);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--shsm);border:1px solid var(--bdr);}\n.card-ttl{font-size:11px;font-weight:700;color:var(--txl);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}\n\n/* Hero */\n.hero{background:var(--grad);border-radius:var(--r);padding:22px;color:#fff;margin-bottom:12px;position:relative;overflow:hidden;}\n.hero::before{content:'\u2600';position:absolute;right:18px;top:10px;font-size:54px;opacity:0.16;}\n.hero-lbl{font-size:11px;opacity:.82;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}\n.hero-amt{font-family:'DM Serif Display',serif;font-size:36px;margin:4px 0 2px;}\n.hero-sub{font-size:12px;opacity:.8;}\n.hero-bar-bg{margin-top:14px;background:rgba(255,255,255,0.24);border-radius:99px;height:5px;}\n.hero-bar{height:5px;border-radius:99px;background:#fff;transition:width .6s;}\n\n/* Stats grid */\n.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}\n.scard{background:var(--surf);border-radius:var(--rsm);padding:14px;box-shadow:var(--shsm);border:1px solid var(--bdr);}\n.scard-lbl{font-size:11px;color:var(--txl);font-weight:700;letter-spacing:.05em;text-transform:uppercase;}\n.scard-val{font-family:'DM Serif Display',serif;font-size:20px;color:var(--tx);margin-top:3px;}\n.scard-sub{font-size:11px;color:var(--txl);margin-top:2px;}\n\n/* Sub-budget */\n.sb-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);}\n.sb-item:last-child{border-bottom:none;}\n.sb-ico{font-size:15px;width:30px;height:30px;background:var(--pale);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.sb-info{flex:1;}\n.sb-name{font-size:12px;font-weight:600;}\n.sb-bw{height:3px;background:var(--pale);border-radius:99px;margin-top:3px;}\n.sb-b{height:3px;border-radius:99px;transition:width .4s;}\n.sb-r{text-align:right;flex-shrink:0;}\n.sb-spent{font-size:12px;font-weight:700;}\n.sb-of{font-size:10px;color:var(--txl);margin-top:1px;}\n\n/* Recent txs */\n.tx-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--bdr);}\n.tx-item:last-child{border-bottom:none;}\n.tx-ico{font-size:15px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.tx-ico.exp{background:var(--pale);}\n.tx-ico.inc{background:#E8F8EE;}\n.tx-ico.trf{background:#EEF0F8;}\n.tx-info{flex:1;}\n.tx-name{font-size:13px;font-weight:600;}\n.tx-meta{font-size:11px;color:var(--txl);margin-top:2px;}\n.tx-amt{font-size:14px;font-weight:700;}\n.tx-amt.exp{color:var(--a2);}\n.tx-amt.inc{color:#2A9A58;}\n.tx-amt.trf{color:#6070B0;}\n.tx-del{background:none;border:none;cursor:pointer;font-size:13px;opacity:0.28;padding:4px;transition:opacity .2s;}\n.tx-del:hover{opacity:1;}\n\n/* Forms */\n.fg{margin-bottom:14px;}\n.flbl{display:block;font-size:11px;font-weight:700;color:var(--txl);margin-bottom:7px;letter-spacing:.06em;text-transform:uppercase;}\n.finp{width:100%;padding:12px 14px;border:1.5px solid var(--bdrm);border-radius:var(--rsm);font-family:inherit;font-size:15px;font-weight:600;color:var(--tx);background:var(--bg);outline:none;transition:border-color .2s,background .2s;}\n.finp:focus{border-color:var(--a1);background:var(--surf);}\nselect.finp{appearance:none;-webkit-appearance:none;cursor:pointer;}\n\n/* Type tabs */\n.ttabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px;}\n.ttab{padding:10px 4px;border:1.5px solid var(--bdrm);border-radius:var(--rsm);background:var(--surf);cursor:pointer;text-align:center;font-family:inherit;font-size:12px;font-weight:700;color:var(--txm);transition:all .15s;}\n.ttab.active{border-color:var(--a1);background:var(--pale);color:var(--a2);}\n\n/* Category grid */\n.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}\n.cbtn{padding:9px 3px;border:1.5px solid var(--bdrm);border-radius:var(--rsm);background:var(--surf);cursor:pointer;text-align:center;font-family:inherit;font-size:10px;font-weight:600;color:var(--txm);transition:all .15s;}\n.cbtn .ce{font-size:18px;display:block;margin-bottom:2px;}\n.cbtn:hover{border-color:var(--a1);background:var(--pale);}\n.cbtn.sel{border-color:var(--a1);background:var(--pale);color:var(--a2);}\n\n/* Buttons */\n.btn-main{width:100%;padding:14px;background:var(--grad);border:none;border-radius:var(--rsm);font-family:inherit;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(0,0,0,0.13);}\n.btn-main:hover{opacity:.9;transform:translateY(-1px);}\n.btn-ghost{width:100%;padding:12px;background:none;border:1.5px solid var(--bdrm);border-radius:var(--rsm);font-family:inherit;font-size:14px;font-weight:600;color:var(--txm);cursor:pointer;transition:all .2s;margin-top:8px;}\n.btn-ghost:hover{border-color:var(--a1);color:var(--a2);}\n.btn-sm{padding:8px 14px;background:var(--a1);border:none;border-radius:var(--rxs);font-family:inherit;font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .2s;white-space:nowrap;}\n.btn-sm:hover{opacity:.85;}\n.btn-sm.ghost{background:none;border:1.5px solid var(--bdrm);color:var(--txm);}\n.btn-sm.danger{background:#E05050;}\n\n/* Account cards */\n.acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}\n.acc-card{background:var(--surf);border-radius:var(--rsm);padding:14px;border:1.5px solid var(--bdr);cursor:pointer;transition:all .15s;position:relative;}\n.acc-card:hover{border-color:var(--a1);}\n.acc-card.sel{border-color:var(--a1);background:var(--pale);}\n.acc-type{font-size:10px;font-weight:700;color:var(--txl);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}\n.acc-name{font-size:13px;font-weight:700;color:var(--tx);}\n.acc-bal{font-family:'DM Serif Display',serif;font-size:18px;margin-top:4px;}\n.acc-bal.pos{color:var(--a2);}\n.acc-bal.neg{color:#D94040;}\n.acc-tag{position:absolute;top:8px;right:10px;font-size:16px;}\n\n/* Emoji picker */\n.epicker{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:180px;overflow-y:auto;padding:8px;background:var(--bg);border-radius:var(--rsm);border:1.5px solid var(--bdrm);margin-top:8px;}\n.epicker-btn{font-size:20px;padding:4px;border:none;background:none;cursor:pointer;border-radius:6px;transition:background .15s;text-align:center;}\n.epicker-btn:hover{background:var(--pale);}\n.epicker.hidden{display:none;}\n\n/* Account list in settings */\n.acc-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);}\n.acc-row:last-child{border-bottom:none;}\n.acc-row-ico{font-size:18px;width:34px;height:34px;background:var(--pale);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}\n.acc-row-info{flex:1;}\n.acc-row-name{font-size:13px;font-weight:700;}\n.acc-row-type{font-size:11px;color:var(--txl);}\n.acc-row-bal{font-size:14px;font-weight:700;color:var(--a2);}\n\n/* Month selector */\n.msel{display:flex;align-items:center;gap:8px;margin-bottom:14px;}\n.mbtn{background:var(--surf);border:1.5px solid var(--bdrm);border-radius:var(--rxs);padding:7px 12px;font-family:inherit;font-size:14px;cursor:pointer;color:var(--txm);}\n.mbtn:hover{border-color:var(--a1);}\n.mdis{flex:1;text-align:center;font-family:'DM Serif Display',serif;font-size:16px;}\n\n/* Theme cards */\n.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}\n< truncated lines 160-746 >\n  save(); renderAccounts(); toast('\u5e33\u6236\u5df2\u522a\u9664');\n}\n\n// \u2550\u2550 EMOJI PICKER \u2550\u2550\nfunction buildEmojiPicker(pickerId, onPick) {\n  const el = document.getElementById(pickerId);\n  el.innerHTML = EMOJIS.map(e=>`<button class=\"epicker-btn\" onclick=\"(${onPick.toString()})('${e}')\">${e}</button>`).join('');\n}\nfunction toggleEmojiPicker(type) {\n  const idMap = {acc:'emojiPickerAcc', cat:'emojiPickerCat', fx:'emojiPickerFx'};\n  const id = idMap[type];\n  const el = document.getElementById(id);\n  if (el.classList.contains('hidden')) {\n    if (el.innerHTML==='') {\n      const cb = type==='acc'\n        ? (e)=>{ selAccEmoji=e; document.getElementById('newAccEmojiDisplay').textContent=e; document.getElementById('emojiPickerAcc').classList.add('hidden'); }\n        : type==='cat'\n        ? (e)=>{ selCatEmoji=e; document.getElementById('newCatEmojiDisplay').textContent=e; document.getElementById('emojiPickerCat').classList.add('hidden'); }\n        : (e)=>{ selFxEmoji=e; document.getElementById('newFxEmojiDisplay').textContent=e; document.getElementById('emojiPickerFx').classList.add('hidden'); };\n      buildEmojiPicker(id, cb);\n    }\n    el.classList.remove('hidden');\n  } else {\n    el.classList.add('hidden');\n  }\n}\n\n// \u2550\u2550 RENDER SETTINGS \u2550\u2550\nfunction renderSettings() {\n  applyTheme();\n  renderFixedExpList();\n  // Cat manage\n  document.getElementById('catManage').innerHTML = D.cats.map(c=>`\n    <div class=\"bset-row\">\n      <span style=\"font-size:18px\">${c.emoji}</span>\n      <span style=\"flex:1;font-size:13px;font-weight:600\">${c.name}</span>\n      <button class=\"btn-sm danger\" onclick=\"deleteCat('${c.id}')\" style=\"font-size:11px;padding:5px 9px\">\u522a</button>\n    </div>`).join('');\n  // Budget settings\n  document.getElementById('budgetSettings').innerHTML = D.cats.filter(c=>c.budget!==undefined).map(c=>`\n    <div class=\"bset-row\">\n      <span style=\"font-size:18px\">${c.emoji}</span>\n      <span style=\"flex:1;font-size:13px;font-weight:600\">${c.name}</span>\n      <input type=\"number\" class=\"binp\" value=\"${c.budget||0}\" onchange=\"updateBudget('${c.id}',this.value)\">\n    </div>`).join('');\n  document.getElementById('totalBudgetDisplay').textContent = fmt(calcBudget());\n}\n\nfunction addCategory() {\n  const name = document.getElementById('newCatName').value.trim();\n  const budget = parseInt(document.getElementById('newCatBudget').value)||undefined;\n  if (!name) { toast('\u8acb\u8f38\u5165\u985e\u5225\u540d\u7a31'); return; }\n  D.cats.push({id:'cat'+Date.now(), name, emoji:selCatEmoji, budget});\n  save();\n  document.getElementById('newCatName').value='';\n  document.getElementById('newCatBudget').value='';\n  selCatEmoji='\ud83d\udce6';\n  document.getElementById('newCatEmojiDisplay').textContent='\ud83d\udce6';\n  toast('\u985e\u5225\u5df2\u65b0\u589e \u2713');\n  renderSettings(); renderCatGrid();\n}\n\nfunction deleteCat(id) {\n  if (!confirm('\u78ba\u5b9a\u522a\u9664\u9019\u500b\u985e\u5225\uff1f')) return;\n  D.cats = D.cats.filter(c=>c.id!==id);\n  save(); renderSettings(); renderCatGrid(); toast('\u985e\u5225\u5df2\u522a\u9664');\n}\n\nfunction updateBudget(id, val) {\n  const cat = D.cats.find(c=>c.id===id);\n  if (cat) cat.budget = parseInt(val)||0;\n  save();\n  document.getElementById('totalBudgetDisplay').textContent = fmt(calcBudget());\n  renderHome();\n}\n\n// \u2550\u2550 FIXED EXPENSES \u2550\u2550\nfunction renderFixedExpList() {\n  const typeLabel = {bank:'\u9280\u884c',cash:'\u73fe\u91d1',credit:'\u4fe1\u7528\u5361',invest:'\u6295\u8cc7',insurance:'\u5132\u84c4\u96aa'};\n  document.getElementById('fixedExpList').innerHTML = (D.fixedExp||[]).length===0\n    ? '<div class=\"empty\"><p>\u5c1a\u672a\u8a2d\u5b9a\u56fa\u5b9a\u6263\u6b3e</p></div>'\n    : (D.fixedExp||[]).map(fx=>{\n        const acc = D.accounts.find(a=>a.id===fx.acc);\n        return `<div class=\"acc-row\">\n          <div class=\"acc-row-ico\">${fx.emoji}</div>\n          <div class=\"acc-row-info\">\n            <div class=\"acc-row-name\">${fx.name}</div>\n            <div class=\"acc-row-type\">${acc?acc.name:'\u672a\u77e5\u5e33\u6236'} \u00b7 \u6bcf\u6708 ${fmt(fx.amt)}</div>\n          </div>\n          <button class=\"btn-sm danger\" onclick=\"deleteFixedExp('${fx.id}')\" style=\"font-size:11px;padding:5px 9px\">\u522a\u9664</button>\n        </div>`;\n      }).join('');\n  // populate selects\n  const catOpts = D.cats.map(c=>`<option value=\"${c.id}\">${c.emoji} ${c.name}</option>`).join('');\n  const accOpts = D.accounts.map(a=>`<option value=\"${a.id}\">${a.emoji} ${a.name}</option>`).join('');\n  const fxCat = document.getElementById('newFxCat');\n  const fxAcc = document.getElementById('newFxAcc');\n  if (fxCat) fxCat.innerHTML = catOpts;\n  if (fxAcc) fxAcc.innerHTML = accOpts;\n  // pre-select \u85aa\u8f49\u5e33\u6236 (a1)\n  if (fxAcc) { const opt = [...fxAcc.options].findIndex(o=>o.value==='a1'); if(opt>=0) fxAcc.selectedIndex=opt; }\n}\n\nfunction addFixedExp() {\n  const name = document.getElementById('newFxName').value.trim();\n  const amt  = parseFloat(document.getElementById('newFxAmt').value)||0;\n  const cat  = document.getElementById('newFxCat').value;\n  const acc  = document.getElementById('newFxAcc').value;\n  if (!name) { toast('\u8acb\u8f38\u5165\u540d\u7a31'); return; }\n  if (!amt)  { toast('\u8acb\u8f38\u5165\u91d1\u984d'); return; }\n  if (!D.fixedExp) D.fixedExp = [];\n  D.fixedExp.push({id:'fx'+Date.now(), name, emoji:selFxEmoji, cat, acc, amt});\n  save();\n  document.getElementById('newFxName').value='';\n  document.getElementById('newFxAmt').value='';\n  selFxEmoji='\ud83d\udcb3';\n  document.getElementById('newFxEmojiDisplay').textContent='\ud83d\udcb3';\n  toast('\u56fa\u5b9a\u6263\u6b3e\u5df2\u65b0\u589e \u2713');\n  renderFixedExpList();\n}\n\nfunction deleteFixedExp(id) {\n  if (!confirm('\u78ba\u5b9a\u522a\u9664\u6b64\u56fa\u5b9a\u6263\u6b3e\uff1f')) return;\n  D.fixedExp = (D.fixedExp||[]).filter(f=>f.id!==id);\n  save(); toast('\u5df2\u522a\u9664'); renderFixedExpList();\n}\n\nfunction autoAddFixed() {\n  const mk = curMK();\n  const key = 'autoFx_' + mk;\n  if (D[key]) return;\n  (D.fixedExp||[]).forEach(fx=>{\n    // avoid duplicates within same month\n    const already = D.txs.some(t=>t.type==='exp' && t.mk===mk && t.fixedId===fx.id);\n    if (!already) {\n      D.txs.push({\n        id:'tx'+Date.now()+'_'+fx.id,\n        type:'exp', amt:fx.amt, cat:fx.cat,\n        acc:fx.acc, note:fx.name+'\uff08\u56fa\u5b9a\uff09',\n        mk, dk:mk+'-01', ts:Date.now(), fixedId:fx.id,\n      });\n    }\n  });\n  D[key] = true;\n  save();\n}\n\n// \u2550\u2550 INIT \u2550\u2550\nconst now = new Date();\ndocument.getElementById('hdrDate').textContent =\n  `${now.getFullYear()}\u5e74${now.getMonth()+1}\u6708${now.getDate()}\u65e5`;\n\napplyTheme();\nautoAddFixed();\nsetTxType('exp');\nrenderHome();\n</script>\n</body>\n</html>
